<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheatreOps | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div id="auth-section" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-100 px-4">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="flex flex-col items-center mb-8">
                <div class="p-3 bg-blue-600 rounded-xl mb-4">
                    <i data-lucide="clapperboard" class="text-white w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Theatre Portal</h2>
                <p class="text-slate-500 text-sm">Sign in to manage contracts</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Username</label>
                    <input type="text" id="username" class="w-full rounded-lg border-slate-200 p-3 border focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Enter username" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Password</label>
                    <input type="password" id="password" class="w-full rounded-lg border-slate-200 p-3 border focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">Sign In</button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden text-center font-medium"></p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden flex flex-col md:flex-row min-h-screen">
        
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 text-white p-6 sticky top-0 h-screen">
            <div class="flex items-center gap-3 mb-10">
                <i data-lucide="layout-dashboard" class="text-blue-400"></i>
                <span class="font-bold text-xl tracking-tight">TheatreOps</span>
            </div>
            
            <nav class="flex-1 space-y-2">
                <a href="#" class="flex items-center gap-3 p-3 bg-blue-600 rounded-lg text-white"><i data-lucide="home" class="w-5 h-5"></i> Dashboard</a>
                <a href="#" class="flex items-center gap-3 p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition"><i data-lucide="file-text" class="w-5 h-5"></i> Reports</a>
                <div id="admin-nav-link" class="hidden">
                    <a href="#admin-section" class="flex items-center gap-3 p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition"><i data-lucide="shield-check" class="w-5 h-5"></i> Admin</a>
                </div>
            </nav>

            <button id="logout-btn-desktop" class="flex items-center gap-3 p-3 text-red-400 hover:bg-red-500/10 rounded-lg transition mt-auto">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="bg-white border-b border-slate-200 p-4 md:px-8 flex justify-between items-center sticky top-0 z-10">
                <div>
                    <h1 class="text-lg font-bold md:text-2xl text-slate-900">Dashboard</h1>
                    <p class="text-xs text-slate-500 hidden md:block">Welcome back, Theatre Administrator</p>
                </div>
                <div class="flex items-center gap-4">
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i data-lucide="bell" class="w-5 h-5"></i></button>
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs border border-blue-200">AD</div>
                </div>
            </header>

            <div class="p-4 md:p-8 space-y-6 pb-24 md:pb-8">
                
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-semibold text-slate-500 uppercase">Total Theatres</p>
                                <h3 class="text-2xl font-bold mt-1">1,284</h3>
                            </div>
                            <span class="p-2 bg-green-50 text-green-600 rounded-lg"><i data-lucide="map-pin" class="w-5 h-5"></i></span>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-semibold text-slate-500 uppercase">Processed Today</p>
                                <h3 class="text-2xl font-bold mt-1">42</h3>
                            </div>
                            <span class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="refresh-cw" class="w-5 h-5"></i></span>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-xs font-semibold text-slate-500 uppercase">Active Contracts</p>
                                <h3 class="text-2xl font-bold mt-1">89%</h3>
                            </div>
                            <span class="p-2 bg-purple-50 text-purple-600 rounded-lg"><i data-lucide="check-circle" class="w-5 h-5"></i></span>
                        </div>
                    </div>
                </div>

                <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="upload-cloud" class="text-blue-600 w-5 h-5"></i>
                        <h2 class="text-lg font-bold text-slate-800">Process Data</h2>
                    </div>
                    <form id="upload-form" class="space-y-4">
                        <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition cursor-pointer group">
                            <input type="file" id="excel-file" accept=".xlsx, .xls" class="hidden" required>
                            <label for="excel-file" class="cursor-pointer">
                                <i data-lucide="file-up" class="w-10 h-10 text-slate-300 mx-auto mb-3 group-hover:text-blue-500"></i>
                                <p class="text-sm text-slate-600">Click to upload or drag & drop</p>
                                <p class="text-xs text-slate-400 mt-1">Excel files only (.xlsx, .xls)</p>
                            </label>
                        </div>
                        <button type="submit" class="w-full md:w-auto px-8 py-3 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-800 transition shadow-md">Process & Download ZIP</button>
                    </form>
                    <div id="upload-status" class="mt-4 p-3 rounded-lg text-sm hidden"></div>
                </section>

                <section id="admin-section" class="hidden space-y-6">
                    <div class="bg-white p-6 rounded-2xl border-t-4 border-slate-900 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-lg font-bold">User Management</h2>
                            <button id="refresh-users-btn" class="p-2 text-slate-500 hover:bg-slate-50 rounded-full transition"><i data-lucide="rotate-cw" class="w-4 h-4"></i></button>
                        </div>
                        
                        <form id="create-user-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end bg-slate-50 p-4 rounded-xl mb-6">
                            <div class="md:col-span-1">
                                <label class="text-[10px] font-bold uppercase text-slate-400 block mb-1">Username</label>
                                <input type="text" id="new-username" class="w-full bg-white border border-slate-200 p-2 rounded-md outline-none focus:border-blue-500" required>
                            </div>
                            <div class="md:col-span-1">
                                <label class="text-[10px] font-bold uppercase text-slate-400 block mb-1">Password</label>
                                <input type="password" id="new-password" class="w-full bg-white border border-slate-200 p-2 rounded-md outline-none focus:border-blue-500" required>
                            </div>
                            <div class="flex items-center h-10">
                                <input type="checkbox" id="new-is-admin" class="w-4 h-4 text-blue-600 border-slate-300 rounded">
                                <label class="ml-2 text-sm text-slate-600">Admin</label>
                            </div>
                            <button type="submit" class="bg-blue-600 text-white h-10 px-4 rounded-md font-semibold hover:bg-blue-700">Create</button>
                        </form>
                        <p id="create-user-status" class="text-xs mb-4 hidden"></p>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-slate-400 text-xs uppercase tracking-wider border-b border-slate-100">
                                        <th class="pb-3 font-semibold">User</th>
                                        <th class="pb-3 font-semibold text-right">Role</th>
                                    </tr>
                                </thead>
                                <tbody id="users-list" class="divide-y divide-slate-50">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center z-50">
            <button class="flex flex-col items-center gap-1 text-blue-600">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Home</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="file-text" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Reports</span>
            </button>
            <button id="logout-btn-mobile" class="flex flex-col items-center gap-1 text-slate-400">
                <i data-lucide="log-out" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Logout</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
