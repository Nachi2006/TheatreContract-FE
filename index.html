<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Processing Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center p-6">
    <div id="auth-section" class="w-full max-w-md bg-white p-8 rounded-lg shadow-md mt-20">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-900">Sign In</h2>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-blue-500 focus:outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:border-blue-500 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-gray-900 text-white p-2 rounded-md hover:bg-gray-800 transition">Login</button>
        </form>
        <p id="login-error" class="text-red-500 text-sm mt-4 hidden text-center"></p>
    </div>

    <div id="dashboard-section" class="w-full max-w-4xl hidden space-y-6 mt-10">
        <div class="flex justify-between items-center bg-white p-6 rounded-lg shadow-sm">
            <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
            <button id="logout-btn" class="text-sm border border-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-100 transition">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h2 class="text-lg font-semibold mb-4 text-gray-800">Process Theatre Data</h2>
            <form id="upload-form" class="flex flex-col sm:flex-row items-start sm:items-center space-y-4 sm:space-y-0 sm:space-x-4">
                <input type="file" id="excel-file" accept=".xlsx, .xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer" required>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition whitespace-nowrap shadow-sm">Upload & Process</button>
            </form>
            <p id="upload-status" class="text-sm mt-4 hidden"></p>
        </div>

        <div id="admin-section" class="bg-white p-6 rounded-lg shadow-sm hidden border-t-4 border-gray-900">
            <h2 class="text-lg font-semibold mb-6 text-gray-800">Admin Controls</h2>
            
            <div class="mb-8 p-4 border border-gray-100 rounded-md bg-gray-50">
                <h3 class="text-md font-medium mb-3">Create New User</h3>
                <form id="create-user-form" class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 md:items-end">
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-gray-600 uppercase tracking-wider mb-1">Username</label>
                        <input type="text" id="new-username" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:outline-none focus:border-gray-500" required>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-gray-600 uppercase tracking-wider mb-1">Password</label>
                        <input type="password" id="new-password" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:outline-none focus:border-gray-500" required>
                    </div>
                    <div class="flex items-center pb-2 px-2">
                        <input type="checkbox" id="new-is-admin" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500">
                        <label class="ml-2 text-sm font-medium text-gray-700">Admin Privileges</label>
                    </div>
                    <button type="submit" class="bg-gray-900 text-white px-6 py-2 rounded-md hover:bg-gray-800 transition">Add User</button>
                </form>
                <p id="create-user-status" class="text-sm mt-3 hidden"></p>
            </div>

            <div>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-md font-medium">Registered Users</h3>
                    <button id="refresh-users-btn" class="text-xs bg-white text-gray-600 px-3 py-1 rounded border border-gray-300 hover:bg-gray-50 transition">Refresh List</button>
                </div>
                <div class="border border-gray-200 rounded-md overflow-hidden">
                    <ul id="users-list" class="divide-y divide-gray-200">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
